# Nuitka compile config for the talyxion CLI — sourced by the CI workflow.
#
# We deliberately use Nuitka over PyInstaller because:
#   - Nuitka produces native compiled code (harder to unzip + read bytecode).
#   - --onefile produces a single binary that bundles the Python runtime.
#   - --standalone keeps the binary self-contained (no system Python needed).
#
# Why a config file vs CLI flags?  CI templates have to read these args from
# somewhere; keeping them under source control means a release reviewer can
# see exactly how the binary was built without spelunking workflow YAML.

# Entry point — the click.Group at talyxion.cli.main:cli.
ENTRY=src/talyxion/cli/main.py

# Output binary name (per-platform suffix appended by the CI matrix).
OUTPUT_NAME=talyxion

# Nuitka flags. Order matters for some — keep grouped.
NUITKA_FLAGS=" \
    --onefile \
    --standalone \
    --assume-yes-for-downloads \
    --remove-output \
    --include-package=talyxion \
    --include-package=keyring \
    --include-package=httpx \
    --include-package=click \
    --include-package=rich \
    --include-package=platformdirs \
    --nofollow-import-to=*.tests \
    --nofollow-import-to=*.test \
    --warn-implicit-exceptions \
    --warn-unusual-code \
    --python-flag=-OO \
    --product-name=Talyxion \
    --product-version=0.1.0 \
    --file-description='Talyxion thin trader CLI' \
    --copyright='Talyxion 2026' \
"

# Files to include alongside the binary in the artefact directory.
EXTRA_FILES=" \
    src/talyxion/cli/keys/talyxion.pub \
    LICENSE \
    README.md \
"
